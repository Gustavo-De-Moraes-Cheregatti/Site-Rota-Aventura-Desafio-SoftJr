<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotéis Populares</title>
    <link rel="stylesheet" href="hoteis_populares.css">
</head>
<body>
    <div class="externa_hoteis_populares">                        <!-- Começo Div "Header" -->
        <div class="externa_logo_hoteis_populares">
            <div class="logo_hoteis_populares"></div>
        </div>
        <div class="titulo_hoteis_populares">
            <h2>Hotéis mais populares</h2>
        </div>
        <div class="externa_subtitulo_hoteis_populares">
            <div class="subtitulo_hoteis_populares">
                <h3>Rio de Janeiro</h3>
            </div>
        </div>
    </div>                                                         <!-- Fim Div "Header" -->
    
    <div class="quadrado_hotel_hoteis_populares">
        <div class="titulo_quadrado_hotel_hoteis_populares">
            <h4>Grand Mercure</h4>
            <div class="avaliacao_quadrado_hoteis_populares">
                <p class="nota_avaliacao_hoteis_populares">8.6</p>
            </div>
        </div>
        <div class="imagem_hotel_hoteis_populares"></div>

        <div class="externa_comodidades_hoteis_populares">
            <div class="comodidade_hoteis_populares">
                <div class="wifi_comodidade_hoteis_populares"></div>
                <p>Wi-fi gratuito</p>
            </div>
            <div class="comodidade_hoteis_populares">
                <div class="cafe_comodidade_hoteis_populares"></div>
                <p>Café da manhã</p>
            </div>
        </div>
    </div>
</body>
</html>
