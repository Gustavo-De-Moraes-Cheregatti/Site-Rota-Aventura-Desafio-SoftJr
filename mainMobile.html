<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rota Aventura</title>
    <link rel="stylesheet" href="mainMobile.css">
</head>
<body>
    <main>
        <section class="header">
            <div class="one">
                <div class="menuGrupo">
                    <button onclick="clickMenu()" id="btn1">
                        <img src="imagens/menu.png" alt="" id="menu" class="dsp">
                    </button>
                 
                    <nav class="cabecalho" id="esconder">
                        <a href="#">Home</a>
                        <a href="#">Ofertas</a>
                        <a href="#">Pacotes</a>
                        <a href="#">Passeios</a>
                        <a href="#">Quem somos</a>
                        <a href="#">Termos</a>
                    </nav>
                </div>

                <div class="dsp">
                    <img src="imagens/logo-Rota-Aventura.jpeg" alt="" id="logo">
                </div>
                <div class="menuGrupo">
                    <button onclick="clickMenu()" id="btn2">
                        <img src="imagens/usuario.png" alt="" id="user" >
                    </button>
                    <nav class="cabecalho" id="esconder2">
                        <a href="">Login</a>
                        <a href="">Cadastre-se</a>
                        <a href="">Sair</a>
                    </nav>
                </div>
            </div>
        </section>


        <section>
            <div class="pacotePerson">
                <h2>
                    Personalize seu Pacote
                </h2>
                <div class="ipt2">
                    <div class="ipt3">
                        <input type="text" placeholder="Origem" class="ipt">
                        <input type="text" placeholder="Destino" class="ipt">
                    </div>
                    <div class="ipt3">
                        <input type="text" placeholder="Ida" class="ipt">
                        <input type="text" placeholder="Volta" class="ipt">
                    </div>
                    <div class="ipt3">
                        <input type="text" placeholder="Passageiros e quartos" class="ipt">
                        <button id="btn3">Buscar</button>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="fundo2">
                <div class="sobrep">
                    <h4>
                        Promoção!!!
                    </h4>
                    <h5>
                        Pacotes para Alagoas a partir de R$ 3.500,00
                    </h5>
                    <p>Para mais detalhes entre em contato</p>
                    <div><img src="" alt=""></div>
                </div>
            </div>
        </section>
        

    </main>
</body>
</html>
