<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realizar Reserva</title>
    <link rel="stylesheet" href="realizar_reserva.css">
</head>
<body>
    <div class="externa_geral_realizar_reserva_desktop">
        <div class="externa_realizar_reserva">                      <!-- Começo Div "Header" -->
            <div class="externa_logo_realizar_reserva">
                <div class="logo_realizar_reserva"><a href="mainMobile.html" class="direcionar_realizar_reserva"></a></div>
            </div>
            <div class="titulo_realizar_reserva">
                <div class="externa_titulo_realizar_reserva_desktop">
                    <h2>Realizar Reserva</h2>
                </div>
            </div>
            <div class="externa_subtitulo_realizar_reserva">
                <div class="subtitulo_realizar_reserva">
                    <h3>Insira seus Dados</h3>
                </div>
            </div>
        </div>                                                      <!-- Fim Div "Header" -->
        <div class="externa_caixas_realizar_reserva">               <!-- Começo Div Input -->
            <div class="caixa_realizar_reserva">
                <input type="text" id="input_realizar_reserva" placeholder="Nome">
            </div>
            <div class="caixa_realizar_reserva">
                <input type="text" id="input_realizar_reserva" placeholder="Sobrenome">
            </div>
            <div class="caixa_realizar_reserva">
                <input type="text" id="input_realizar_reserva" placeholder="E-mail">
            </div>
            <div class="caixa_realizar_reserva">
                <input type="text" id="input_realizar_reserva" placeholder="Telefone">
            </div>
            <div class="caixa_realizar_reserva">
                <input type="text" id="input_realizar_reserva" placeholder="País">
            </div>
            <div class="caixa_realizar_reserva">
                <input type="text" id="input_realizar_reserva" placeholder="Data de Nascimento">
            </div>
        </div>                                                      <!-- Fim Div Input -->

        <hr>

        <div class="externa_caixas_forma_pagamento">
            <div class="caixa_realizar_reserva">
                <input type="text" id="input_realizar_reserva" placeholder="Nome do Titular do Cartão">
            </div>
            <div class="caixa_realizar_reserva">
                <input type="text" id="input_realizar_reserva" placeholder="Número do Cartão">
            </div>
            <div class="caixa_realizar_reserva">
                <input type="text" id="input_realizar_reserva" placeholder="CVV">
            </div>
            <div class="caixa_realizar_reserva">
                <input type="text" id="input_realizar_reserva" placeholder="Data de validade">
            </div>
        </div>

        <div class="externa_botao_pagamento_realizar_reserva">
            <div class="botao_pagamento_realizar_reserva">
                <a href="forma-de-pagamento.html">Forma de Pagamento</a>
            </div>
        </div>
    </div>
</body>
</html>
