<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Imagens</title>
    <link rel="stylesheet" href="teste.css">
</head>
<body>

    <div class="galeria">
        <img src="imagens/Hilton-Barra-Frente.jpg" alt="Imagem 1" class="galeria-item">
        <img src="imagens/Hilton-barra-Quarto.jpg" alt="Imagem 2" class="galeria-item">
        <img src="imagens/Hilton-Barra-Piscina.jpg" alt="Imagem 3" class="galeria-item">
        <img src="imagens/hilton-barra-rio-de-janeiro.jpg" alt="imagem 4" class="galeria-item">
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
            <div class="externa_lightbox-content">
                <div class="lightbox-content1" id="lightbox-img1"></div>
                <div class="lightbox-content2" id="lightbox-img2"></div>
                <div class="lightbox-content3" id="lightbox-img3"></div>
                <div class="lightbox-content4" id="lightbox-img4"></div>
            </div>
        <div class="outras_imagens_lightbox">
            <div class="imagem_1"></div>
            <div class="imagem_2"></div>
            <div class="imagem_3"></div>
            <div class="imagem_4"></div>
        </div>
    </div>

    <script src="teste.js"></script>
</body>
</html>
