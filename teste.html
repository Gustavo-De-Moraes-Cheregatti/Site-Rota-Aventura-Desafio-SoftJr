<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Imagens</title>
    <link rel="stylesheet" href="teste.css">
</head>
<body>

    <div class="gallery">
        <img src="imagens/Hilton-Barra-Frente.jpg" alt="Imagem 1" class="gallery-item">
        <img src="imagens/Hilton-barra-Quarto.jpg" alt="Imagem 2" class="gallery-item">
        <img src="imagens/Hilton-Barra-Piscina.jpg" alt="Imagem 3" class="gallery-item">
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div class="outras_imagens_lightbox">
            <img src="imagens/hilton-barra-rio-de-janeiro.jpg" alt="">
        </div>
    </div>

    <script src="teste.js"></script>
</body>
</html>
